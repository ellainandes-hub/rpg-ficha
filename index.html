<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>RPG Ficha</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>Ficha RPG</h1>

</header>

<main>

<div class="login-box">

<h2>Login</h2>

<input id="usuario" placeholder="Nome de usuário">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<hr>

<h2>Criar Conta</h2>

<input id="novoUsuario" placeholder="Novo usuário">
<input id="novaSenha" type="password" placeholder="Nova senha">

<button onclick="criarConta()">Criar</button>

</div>

</main>

<script src="js/app.js"></script>

</body>
</html>
